<!DOCTYPE html>
<html>

<head>

<title>Travel Explore</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#009688;
color:white;
text-align:center;
padding:20px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.gallery img{
width:300px;
height:200px;
object-fit:cover;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<header>
<h1>🌍 Travel Explore Gallery</h1>
</header>

<div class="gallery">

<img src="images/img1.jpg">
<img src="images/img2.jpg">
<img src="images/img3.jpg">
<img src="images/img4.jpg">
<img src="images/img5.jpg">
<img src="images/img6.jpg">
<img src="images/img7.jpg">
<img src="images/img8.jpg">
<img src="images/img9.jpg">
<img src="images/img10.jpg">

</div>

</body>

</html>
