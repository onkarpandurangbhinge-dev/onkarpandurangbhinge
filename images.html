<!DOCTYPE html>
<html>

<head>

<title>Travel Explore</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#009688;
color:white;
text-align:center;
padding:20px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.gallery img{
width:300px;
height:200px;
object-fit:cover;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<header>

<h1>🌍 Travel Explore Gallery</h1>
<p>Beautiful Places Around The World</p>

</header>

<div class="gallery">

<img src="images/forest.jpg" alt="Forest">
<img src="images/beach.jpg" alt="Beach">
<img src="images/waterfall.jpg" alt="Waterfall">
<img src="images/island.jpg" alt="Island">
<img src="images/bridge.jpg" alt="Bridge">
<img src="images/mountain.jpg" alt="Mountain">
<img src="images/lake.jpg" alt="Lake">
<img src="images/sunset.jpg" alt="Sunset">
<img src="images/snowy.jpg" alt="Snow Mountain">
<img src="images/boat.jpg" alt="Boat Travel">

</div>

</body>

</html>
